<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content="width=device-width, initial-scale=1.0">
        <title>ステレオカメラ　リモコン</title>
        <style>
           /* CSS：ここで色や形を整えます */
            body { text-align: center; font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
            .preview-box { width: 100%; max-width: 600px; margin: 0 auto; border: 3px solid #444; border-radius: 10px; }
            img { width: 100%; display: block; }
            .btn { width: 90%; height: 100px; font-size: 24px; font-weight: bold; background: #28a745; color: white; 
               border: none; border-radius: 15px; margin-top: 20px; cursor: pointer; }
            .btn:active { background: #1e7e34; transform: scale(0.98); } /* 押した時だけ少し小さく */
            #status { font-size: 18px; margin-top: 15px; color: #00ff00; } 
        </style>
    </head>
    <body>
        <h2>📸 ステレオ撮影リモコン</h2>

        <div class="preview-box">
            <img src="{{ url_for('video_feed')}}">
        </div>

        <button class="btn" onclick="saveImage()">画像を保存（SAVE）</button>
        <p id="status">Ready</p>

        <script>
            /* JavaScript：ボタンが押された時の「動き」を書きます */
            async function saveImage() {
                const status = document.getElementById('status')
                status.innerText='保存中．．．';

                try{
                    //python側の/saveを呼び出す
                    const response = await fetch('/save')
                    const message = await response.text();
                    status.innerText=message;
                }catch(e){
                    status.innerText="通信エラーが発生しました";
                }
            }
        </script>
    </body>
</html>
